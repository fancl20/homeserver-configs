{
   "apiVersion": "image.toolkit.fluxcd.io/v1beta2",
   "kind": "ImagePolicy",
   "metadata": {
      "name": "chrome",
      "namespace": "flux-system"
   },
   "spec": {
      "filterTags": {
         "extract": "$MAJOR.$MINOR.$PATCH$SUFFIX",
         "pattern": "^(?P<MAJOR>\\d+)\\.(?P<MINOR>\\d+)\\.\\d+\\.(?P<PATCH>\\d+)(?P<SUFFIX>-testing-\\d+)$"
      },
      "imageRepositoryRef": {
         "name": "chrome"
      },
      "policy": {
         "semver": {
            "range": "*-testing-"
         }
      }
   }
}
