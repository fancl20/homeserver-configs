---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ceph-csi-operator
  namespace: rook-ceph
spec:
  interval: 1h
  url: https://ceph.github.io/ceph-csi-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 15m
  chart:
    spec:
      chart: ceph-csi-drivers
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
  values:
    drivers:
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
      rbd:
        enabled: false
      nfs:
        enabled: false
      nvmeof:
        enabled: false

